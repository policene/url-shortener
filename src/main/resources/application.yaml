spring:

  application:
    name: url-shortener

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: "com.mysql.cj.jdbc.Driver"

  jpa:
    properties:
      hibernate:
        dialect: "org.hibernate.dialect.MySQLDialect"
        ddl-auto: validate

  flyway:
    enabled: true

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

