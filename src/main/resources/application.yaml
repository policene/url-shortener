spring:

  application:
    name: url-shortener

  datasource:
    url: "jdbc:mysql://localhost:3306/url_shortener?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC"
    username: root
    password: pass
    driver-class-name: "com.mysql.cj.jdbc.Driver"

  jpa:
    properties:
      hibernate:
        dialect: "org.hibernate.dialect.MySQLDialect"
        ddl-auto: validate

  flyway:
    enabled: true

app:
  base-url: ${APP_BASE_URL:http://localhost:8080}

